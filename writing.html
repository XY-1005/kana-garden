<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>假名书写 | Kana Garden</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>

<body>

<header class="header small">
  <h1>✏️ 假名书写练习</h1>
  <a class="back" href="index.html">返回首页</a>
</header>

<main id="write-page">

  <!-- 左侧：假名选择 -->
  <aside id="kana-panel">

    <div class="daily-box">
      今日练习：<span id="dailyChar"></span>
    </div>

    <div class="tab-row">
      <button class="tab active" id="hiraTab">平假名</button>
      <button class="tab" id="kataTab">片假名</button>
    </div>

    <div id="kanaList"></div>

  </aside>

  <!-- 右侧：书写区域 -->
  <section id="write-area">

    <div id="canvas-box">
      <canvas id="gridCanvas" width="300" height="300"></canvas>
      <canvas id="strokeCanvas" width="300" height="300"></canvas>
      <canvas id="writeCanvas" width="300" height="300"></canvas>
    </div>

    <div id="tool-row">
      <button id="prevStroke">上一笔</button>
      <button id="nextStroke">下一笔</button>
      <button id="autoPlay">自动描红</button>
      <button id="brushMode">笔刷</button>
      <button id="eraserMode">橡皮擦</button>
      <button id="colorPick">颜色</button>
      <button id="downloadBtn">保存</button>
      <button id="clearBtn">清除</button>
    </div>

    <div id="resultMsg"></div>

  </section>

</main>

<script src="js/kana-data.js"></script>
<script src="js/stroke-data.js"></script>
<script src="js/writing.js"></script>

</body>
</html>
