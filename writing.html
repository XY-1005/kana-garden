<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>假名书写练习</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>

<body>

<header class="header small">
  <h1>✏️ 假名书写练习</h1>
  <a class="back" href="index.html">返回首页</a>
</header>

<main id="write-page">

  <!-- 左侧区域：按钮 + 假名单 -->
  <section id="left-panel">

    <div id="switch-row">
      <button id="showHira" class="tab active">平假名字帖</button>
      <button id="showKata" class="tab">片假名字帖</button>
    </div>

    <!-- 假名按钮区（点击后显示字帖） -->
    <div id="kanaButtons" class="kana-buttons"></div>

  </section>

  <!-- 右侧：字帖 + 手写 -->
  <section id="write-area">

    <div id="canvas-box">
      <canvas id="gridCanvas" width="300" height="300"></canvas>
      <canvas id="strokeCanvas" width="300" height="300"></canvas>
      <canvas id="writeCanvas" width="300" height="300"></canvas>
    </div>

    <button id="clearBtn" class="clear-btn">清除</button>

  </section>

</main>

<script src="js/kana-data.js"></script>
<script src="js/stroke-data.js"></script>
<script src="js/writing.js"></script>
</body>
</html>
