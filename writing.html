<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>假名书写练习 | Kana Garden</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>

<body>

<header class="header small">
  <h1>✏️ 假名书写练习</h1>
  <a class="back" href="index.html">返回首页</a>
</header>

<main class="write-layout">

  <!-- 左侧假名选择栏 -->
  <div class="sidebar">
    <h3>选择假名</h3>

    <!-- 今日推荐 -->
    <div class="daily-box">
      今日练习：<span id="dailyChar" class="daily-char"></span>
    </div>

    <!-- 模式选择：平假名 / 片假名 -->
    <button class="tab-btn active" id="hiraTab">平假名</button>
    <button class="tab-btn" id="kataTab">片假名</button>

    <!-- 假名单 -->
    <div id="kanaList" class="kana-list"></div>
  </div>

  <!-- 右侧书写区域 -->
  <div class="write-container">

    <!-- 三层画布 -->
    <div class="canvas-wrapper">
      <canvas id="gridCanvas" width="300" height="300"></canvas>
      <canvas id="strokeCanvas" width="300" height="300"></canvas>
      <canvas id="writeCanvas" width="300" height="300"></canvas>
    </div>

    <!-- 工具栏 -->
    <div class="write-tools">
      <button id="prevStroke">上一笔</button>
      <button id="nextStroke">下一笔</button>
      <button id="autoPlay">自动描红</button>

      <button id="brushMode">笔刷</button>
      <button id="eraserMode">橡皮擦</button>
      <button id="colorPick">颜色</button>

      <button id="downloadBtn">保存</button>
      <button id="clearBtn" class="clear-btn">清除</button>
    </div>

    <!-- 显示评分提示 -->
    <div id="resultMsg" class="result-msg"></div>

  </div>

</main>

<script src="js/kana-data.js"></script>
<script src="js/stroke-data.js"></script>
<script src="js/writing.js"></script>

</body>
</html>
