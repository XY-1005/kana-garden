<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>假名书写练习</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>

<body>

<header class="header small">
  <h1>✏️ 假名书写练习</h1>
  <a class="back" href="index.html">返回首页</a>
</header>

<main id="write-center">

  <!-- 选择按钮 -->
  <div id="tabs">
    <button id="hiraBtn" class="tab-btn">平假名</button>
    <button id="kataBtn" class="tab-btn">片假名</button>
  </div>

  <!-- 字帖列表（初始隐藏） -->
  <div id="kanaList" class="kana-list hidden"></div>

  <!-- 书写区域 -->
  <div id="canvas-box">
    <canvas id="gridCanvas" width="300" height="300"></canvas>
    <canvas id="strokeCanvas" width="300" height="300"></canvas>
    <canvas id="writeCanvas" width="300" height="300"></canvas>
  </div>

  <!-- 工具 -->
  <div id="tool-row">
    <button id="clearBtn">清除</button>
  </div>

  <div id="resultMsg"></div>

</main>

<script src="js/kana-data.js"></script>
<script src="js/stroke-data.js"></script>
<script src="js/writing.js"></script>

</body>
</html>
